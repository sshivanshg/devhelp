name: Bug report
description: devhelp did something wrong, or failed to do something right.
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, what actually happened?
      placeholder: |
        I ran `devhelp "set up vercel/next.js"` and it tried to install Node 18 instead of 20.
    validations:
      required: true

  - type: textarea
    id: dry-run-output
    attributes:
      label: Dry-run output
      description: Re-run with `--dry-run` and paste the full output. This is the single most useful piece of info.
      render: shell
    validations:
      required: true

  - type: textarea
    id: failure-panel
    attributes:
      label: The failure panel
      description: Paste the full `INCOMPLETE` / `UNSUPPORTED` panel as printed — the what / why / fix block, not just the last line.
      render: shell

  - type: textarea
    id: run-log
    attributes:
      label: Run-log JSON
      description: |
        Every run writes a full record to `~/.devhelp/runs/<timestamp>.json` and prints its path at the end. Open the newest one and paste its contents (or attach the file). It captures the detected stack, every step, and the real failure output — it's what makes the bug reproducible.
      render: json

  - type: input
    id: os
    attributes:
      label: OS + architecture
      placeholder: macOS 15.4 (arm64) / Ubuntu 24.04 (x86_64)
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`
      placeholder: v20.11.1
    validations:
      required: true

  - type: input
    id: devhelp-version
    attributes:
      label: devhelp version
      description: Output of `devhelp --version`
      placeholder: 0.1.0
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Repo link, relevant manifests, hunches, screenshots — anything.
